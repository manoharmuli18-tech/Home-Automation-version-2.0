<!DOCTYPE html>
<html>
<head>
  <title>IoT Dashboard</title>
  <script src="https://socket.io/socket.io.js"></script>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: #e2e8f0; text-align: center; padding: 40px; }
    .card { background: #1e293b; border-radius: 12px; padding: 30px; display: inline-block; margin: 20px; min-width: 150px; }
    .value { font-size: 3rem; font-weight: bold; color: #38bdf8; }
    .label { font-size: 1rem; color: #94a3b8; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>🌡️ IoT Sensor Dashboard</h1>
  <div class="card">
    <div class="value" id="temp">--</div>
    <div class="label">Temperature (°C)</div>
  </div>
  <div class="card">
    <div class="value" id="hum">--</div>
    <div class="label">Humidity (%)</div>
  </div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("http://127.0.0.1:5000");

socket.on("connect", () => {
    console.log("Connected:", socket.id);
});

socket.on("sensor_data", (data) => {
    console.log("Received:", data);

    document.getElementById("temp").textContent = data.temp.toFixed(1);
    document.getElementById("hum").textContent = data.hum.toFixed(1);
});
</script>
</body>
</html>
